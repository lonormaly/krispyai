# @krispy/edge — the live-chat + human-handoff Worker (HTTP routes + SessionDO).
# One Worker hosts everything: the /api/* routes AND the hibernatable WebSocket
# Durable Object. Deploy: `bunx wrangler deploy`. Local: `bunx wrangler dev`.

name = "krispy-edge"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI — the default (free) LLM provider. Answers /api/chat.
[ai]
binding = "AI"

# Per-(tenant,session) WebSocket fan-out + the strongly-consistent handedOff flag.
[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

# topic<->session map, tenant config, usage counters.
[[kv_namespaces]]
binding = "KRISPY_KV"
id = "REPLACE_WITH_KV_ID" # `bunx wrangler kv namespace create KRISPY_KV`

# ── secrets (NOT here — set with `bunx wrangler secret put <NAME>`) ───────────
#   TELEGRAM_BOT_TOKEN        BotFather token
#   TELEGRAM_CHAT_ID          supergroup id with Topics enabled (e.g. -1001234567890)
#   TELEGRAM_WEBHOOK_SECRET   random string; also passed to setWebhook (secret_token)
# ── optional vars ─────────────────────────────────────────────────────────────
[vars]
ALLOWED_ORIGIN = "*" # lock to your site origin in production
# AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# SYSTEM_PROMPT = "You are ..."

# ── deploy environments ──────────────────────────────────────────────────────
# Two isolated Workers, one per env — a deploy targets one with `wrangler deploy
# --env <preview|production>` (see deploy.sh / the Tilt deploy:edge-* resources).
# Wrangler named envs do NOT inherit bindings, so each repeats AI/DO/KV. Give each
# its OWN KV namespace id so preview and prod don't share tenant config/usage.
[env.preview]
name = "krispy-edge-preview"
[env.preview.ai]
binding = "AI"
[[env.preview.durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"
[[env.preview.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]
[[env.preview.kv_namespaces]]
binding = "KRISPY_KV"
id = "REPLACE_WITH_PREVIEW_KV_ID" # `bunx wrangler kv namespace create KRISPY_KV_preview`
[env.preview.vars]
ALLOWED_ORIGIN = "*"

[env.production]
name = "krispy-edge"
[env.production.ai]
binding = "AI"
[[env.production.durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]
[[env.production.kv_namespaces]]
binding = "KRISPY_KV"
id = "REPLACE_WITH_PROD_KV_ID" # `bunx wrangler kv namespace create KRISPY_KV_production`
[env.production.vars]
ALLOWED_ORIGIN = "*" # lock to your site origin in production
# Custom domain edge.krispyai.com is attached in the CF dashboard (Workers →
# Settings → Domains) AFTER the first deploy — not here, since the krispyai.com
# zone lands in CF only once the NS transfer completes. Once attached, uncomment:
# routes = [{ pattern = "edge.krispyai.com", custom_domain = true }]
