# OpenAPI 3.1 contract for the @krispy/edge Cloudflare Worker.
#
# This file IS the contract — there is NO auto-generation from the Worker. It only
# stays true if you edit it in the same change as the route (see AGENTS.md §7). The
# ground truth it mirrors: services/edge/src/index.ts (routing + handlers),
# services/edge/src/types.ts (TenantConfig / WidgetTheme / FormSpec / Connector),
# the Bruno collection in api-collection/, and apps/docs/content/docs/reference/edge-routes.mdx.
#
# Auth model: per-route shared-secret HEADERS, plus a bearer on the operator surface.
# Public routes are CORS-* and secret-free; secret-guarded routes carry a bot token or
# mutate config, so a missing/wrong secret returns 401 (config routes) or 403 (webhook,
# billing) and leaks nothing. The /api/operator/* routes (and the ?role=operator WS
# upgrade) take the operator app's bearer, verified in-Worker against the cloud API's
# GET /me (see `operatorBearer`), OR the tenant-sync secret for server-to-server callers.
openapi: 3.1.0
info:
  title: Krispy edge Worker API
  version: 0.1.0
  description: >
    One Cloudflare Worker hosts every HTTP route below plus the hibernatable `SessionDO`.
    CORS allow-origin is `ALLOWED_ORIGIN` (default `*`); every route answers `OPTIONS` with 204.
    The `SessionDO`'s internal surface (`/state`, `/operator`, `/handoff`) is Worker-only and
    intentionally NOT documented here — the browser never calls it directly.
  license:
    name: MIT
    url: https://github.com/lonormaly/krispyai/blob/master/LICENSE
servers:
  - url: http://localhost:8787
    description: local (wrangler dev)
  - url: https://edge.krispyai.com
    description: production edge Worker (custom domain, attached in CF after first deploy)

tags:
  - name: public
    description: CORS-*, secret-free — the widget/browser calls these.
  - name: secret-guarded
    description: Carry a bot token or mutate config — require a shared-secret header.

paths:
  /health:
    get:
      tags: [public]
      summary: Liveness probe
      operationId: health
      security: [] # public — no auth
      responses:
        "200":
          description: Worker is up.
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: { type: string, const: ok }
                  service: { type: string, const: edge }

  /api/chat:
    post:
      tags: [public]
      summary: Visitor message → AI reply (mirrored to the owner's Telegram topic)
      operationId: chat
      description: >
        Before answering, the Worker checks entitlement + plan limits. The self-host tenant
        (`"self"`) is always entitled and unmetered; a non-self tenant with no valid snapshot
        gets 402, and one over its cap gets 429.
      security: [] # public — no auth
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: The AI (or handoff) result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResult" }
        "400":
          description: Missing `sessionId` or `message`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: >
            message_too_large — the `message` exceeds the absurd-payload hard cap (~32KB),
            rejected before any work (cost-DoS guard). A legit-but-long message under the cap
            is NOT rejected — it is silently truncated to 4000 chars before the model.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "402":
          description: subscription_required — non-self tenant without a valid entitlement snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitlementError" }
        "429":
          description: usage_limit_reached — tenant is over its plan cap.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntitlementError" }

  /api/contact:
    post:
      tags: [public]
      summary: Legacy contact-capture shim → owner's Telegram topic
      operationId: contact
      description: >
        Legacy contact-capture: drops name/contact/message into the visitor's existing topic.
        Superseded by the generalized `/api/lead` fan-out; kept for older embeds.
      security: [] # public — no auth
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContactRequest" }
      responses:
        "200":
          description: Acknowledged (delivery is best-effort; no topic → no-op).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "400":
          description: Missing `sessionId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/lead:
    post:
      tags: [public]
      summary: A form's captured values fan out to the tenant's delivery connectors
      operationId: lead
      description: >
        The generalized lead endpoint: a data-driven form's `values` fan out to the tenant's
        DELIVERY connectors (Telegram topic + email via Resend). `whatsapp`/`instagram`
        connectors are CTA-only — nothing is delivered server-side for them. Rate-limited per
        (tenant, session).
      security: [] # public — no auth
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadRequest" }
      responses:
        "200":
          description: Accepted and fanned out.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "400":
          description: Missing `sessionId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: rate_limited — too many lead submissions for this (tenant, session).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/widget/config:
    get:
      tags: [public]
      summary: Public, secret-free widget appearance projection
      operationId: widgetConfig
      description: >
        The widget's boot-time read of its appearance/forms. Returns ONLY the whitelist
        projection (`theme`) — NEVER botToken/chatId/systemPrompt. Do not confuse with the
        secret-guarded `GET /api/tenant/config`, which returns the full config.
      security: [] # public — no auth
      parameters:
        - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          description: The public theme projection (fields are all optional / may be absent).
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme: { $ref: "#/components/schemas/WidgetTheme" }

  /api/usage:
    get:
      tags: [public]
      summary: Metering readout — usage counters vs the entitlement's caps
      operationId: usage
      security: [] # public — no auth
      parameters:
        - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          description: Usage + plan snapshot for the tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageResponse" }

  /internal/usage:
    get:
      tags: [internal]
      summary: Cross-tenant cost readout for the Krispy Cloud admin (secret-authed)
      operationId: internalUsage
      description: >
        The founder admin's per-tenant token counters (in/out split) so the Cloud app can
        price input vs output separately. workerd (the Cloud app) can't read the edge's KV
        directly, so the admin cost view fetches over this one guarded call. Fail-closed: no
        `ADMIN_USAGE_SECRET` configured, or a missing/mismatched header → 403 (the counters
        carry no auth of their own — never leaked unauthenticated). `t` accepts one tenant id
        or a comma-separated batch, so N tenants are fetched in one round-trip.
      security:
        - adminUsageSecret: []
      parameters:
        - name: t
          in: query
          required: true
          description: One tenant id, or a comma-separated batch (`a,b,c`).
          schema: { type: string }
      responses:
        "200":
          description: Month-to-date counters keyed by tenant id.
          content:
            application/json:
              schema:
                type: object
                required: [usage]
                properties:
                  usage:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/UsageDetail" }
        "400":
          description: Missing `t`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Missing/wrong `x-admin-usage-secret` (or the secret is not configured).

  /api/session/{id}/ws:
    get:
      tags: [public]
      summary: Visitor's live channel — WebSocket upgrade forwarded to the SessionDO
      operationId: sessionWs
      description: >
        A WebSocket upgrade request; the Worker forwards it to the `(tenant, session)` DO. The
        visitor receives `{ type: "ready", handedOff }` on connect, then `operator` / `handoff`
        / `resume` events. `{ type: "resume" }` = the AI took the session back — sent when an
        operator resolves it (app swipe, `/api/operator/resolve`, Telegram `/done`) or when the
        operator-silence alarm fires (`HANDBACK_SILENCE_MINUTES` after a visitor message on a
        handed-off session with no operator reply, default 5). The widget drops its "human
        joined" framing and the bot answers again. Not a normal JSON response — this row
        documents the upgrade contract.
        With `role=operator` the DO tags the socket as an operator's (the Buttr app's in-thread
        live channel) — it receives the full event union PLUS the operator-only
        `{ type: "message", role: "visitor" | "ai", text, ts }` mirror of live ring appends
        (seed replays stay silent). The visitor fan-out is untouched.
        With `role=operator` the upgrade REQUIRES `auth=<bearer token>` — RN/browsers can't
        set headers on a WS upgrade, so the operator app's bearer rides as a query param and
        is verified exactly like the `operatorBearer` header scheme (401 invalid/missing,
        403 token↔tenant mismatch) before the upgrade reaches the DO.
      security: [] # public for visitors — operator sockets authenticate via ?auth
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: The visitor's session id.
        - $ref: "#/components/parameters/Tenant"
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [operator] }
          description: Tag the socket as an operator's (Buttr app). Omit for the visitor widget.
        - name: auth
          in: query
          required: false
          schema: { type: string }
          description: >
            Operator bearer token (REQUIRED when `role=operator`, ignored otherwise).
            Same token/verification as the `operatorBearer` scheme.
        - name: Upgrade
          in: header
          required: true
          schema: { type: string, const: websocket }
      responses:
        "101":
          description: Switching Protocols — WebSocket established (handled by the DO).
        "401":
          description: "`role=operator` without a valid `auth` token."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: "`role=operator` with a valid token that belongs to another tenant."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "426":
          description: Upgrade Required — the request was not a WebSocket upgrade.

  /api/operator/reply:
    post:
      tags: [public]
      summary: Operator app reply into a live visitor thread
      operationId: operatorReply
      description: >
        The Buttr operator app's reply — the second trigger of the same SessionDO handoff spine
        Telegram uses. Sets `handedOff`, appends the reply to the session's 20-message ring
        buffer, and broadcasts `{ type: "operator", text }` to the visitor's WebSocket. The
        replying operator is learned with `channel: 'app'`, so the Telegram handoff @mention
        skips them (they get the push instead). Metered as a handoff. Auth: the app's bearer
        is verified in-Worker against the cloud API's `GET /me` and must resolve to the
        claimed `tenantId`; server-to-server callers may send `x-tenant-sync-secret` instead.
      security:
        - operatorBearer: []
        - tenantSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OperatorReplyRequest" }
      responses:
        "200":
          description: Delivered to the session's DO (visitor sockets notified).
          content:
            application/json:
              schema:
                type: object
                required: [ok, delivered]
                properties:
                  ok: { type: boolean, const: true }
                  delivered: { type: boolean, const: true }
        "400":
          description: Missing `tenantId`, `sessionId` or `text`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/invalid credentials (no bearer or secret, expired token, or no `API_ORIGIN` verifier configured — auth fails closed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Valid bearer, but the token's user is not the claimed `tenantId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/operator/handoffs:
    post:
      tags: [public]
      summary: Operator app inbox — the tenant's handed-off sessions
      operationId: operatorHandoffs
      description: >
        Every handed-off session for the tenant, newest activity first, each with a
        `lastMessage` preview from the session's ring buffer. Resolved sessions are
        EXCLUDED by default; pass `includeResolved: true` to list them too (rows carry
        `resolved: true` and `handedOff: false` — resolving hands the session back to
        the AI). No dedicated handoff index
        exists — the Worker scans the session→thread KV map (first page, 1000 sessions) and
        asks each SessionDO for a one-shot summary.
      security:
        - operatorBearer: []
        - tenantSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId: { type: string }
                includeResolved:
                  type: boolean
                  default: false
                  description: Also list resolved sessions.
      responses:
        "200":
          description: The inbox list.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperatorHandoffsResponse" }
        "400":
          description: Missing `tenantId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/invalid credentials (no bearer or secret, expired token, or no `API_ORIGIN` verifier configured — auth fails closed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Valid bearer, but the token's user is not the claimed `tenantId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/operator/thread:
    post:
      tags: [public]
      summary: One session's messages from the DO ring buffer
      operationId: operatorThread
      description: >
        The session's last 20 messages (visitor / AI / operator) from the SessionDO ring
        buffer — zero Telegram round-trips. On handoff the ring is seeded from the history
        the widget re-sends on `/api/chat`, so pre-handoff turns are present.
      security:
        - operatorBearer: []
        - tenantSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, sessionId]
              properties:
                tenantId: { type: string }
                sessionId: { type: string }
      responses:
        "200":
          description: The thread messages, oldest first.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperatorThreadResponse" }
        "400":
          description: Missing `tenantId` or `sessionId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/invalid credentials (no bearer or secret, expired token, or no `API_ORIGIN` verifier configured — auth fails closed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Valid bearer, but the token's user is not the claimed `tenantId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/operator/resolve:
    post:
      tags: [public]
      summary: Toggle a session's resolved flag (inbox hygiene + hand back to the AI)
      operationId: operatorResolve
      description: >
        Toggle the session's `resolved` flag in its SessionDO. Resolving ALSO hands the
        session back to the AI — `handedOff` flips false and `{ type: "resume" }` is
        broadcast to the session's WebSockets (the widget drops its "human joined"
        framing), so the bot answers the visitor's next message. Resolved sessions drop
        out of the default `/api/operator/handoffs` inbox; toggling again un-resolves
        (undo an accidental swipe) WITHOUT re-handing-off — an operator reply re-takes
        over. A NEW live visitor message on a resolved session un-resolves it
        automatically (also without re-handing-off — the conversation is live again,
        answered by the AI).
      security:
        - operatorBearer: []
        - tenantSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, sessionId]
              properties:
                tenantId: { type: string }
                sessionId: { type: string }
      responses:
        "200":
          description: The new resolved state.
          content:
            application/json:
              schema:
                type: object
                required: [ok, resolved]
                properties:
                  ok: { type: boolean, const: true }
                  resolved:
                    type: boolean
                    description: The state AFTER the toggle.
        "400":
          description: Missing `tenantId` or `sessionId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/invalid credentials (no bearer or secret, expired token, or no `API_ORIGIN` verifier configured — auth fails closed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Valid bearer, but the token's user is not the claimed `tenantId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/telegram/webhook:
    post:
      tags: [secret-guarded]
      summary: Owner's Telegram reply → push to the visitor via the DO
      operationId: telegramWebhook
      description: >
        Telegram calls this with the owner's reply in a forum topic. The Worker verifies the
        secret Telegram echoes back, resolves the session for the topic, and pushes the reply
        to the visitor (setting `handedOff` and disarming the silence hand-back alarm).
        Non-owner updates are ack'd and ignored. COMMAND: a reply of exactly `/done` (or
        `resolved`, case-insensitive) is NOT forwarded to the visitor — it resolves the
        session and hands it back to the AI (same semantics as `/api/operator/resolve` with
        a force-set), then acks into the topic. The command is advertised in the handoff
        alert message.
      security:
        - telegramWebhookSecret: []
      requestBody:
        required: true
        description: A Telegram Update object (opaque here — only owner replies are acted on).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: "`ok` — ack (whether or not it was an actionable owner reply)."
          content:
            text/plain:
              schema: { type: string, const: ok }
        "403":
          description: Missing/wrong `x-telegram-bot-api-secret-token`.

  /api/billing/entitlement:
    post:
      tags: [secret-guarded]
      summary: Mirror an entitlement snapshot into KV (hosted/multi-tenant only)
      operationId: billingEntitlement
      description: >
        A billing service (payment webhook / trial start) pushes a tenant's entitlement snapshot
        into KV so the `/api/chat` gate can read it. Unused in single-tenant self-host.
      security:
        - billingSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntitlementSyncRequest" }
      responses:
        "200":
          description: Snapshot written.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "400":
          description: Missing `tenantId` or `snapshot`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: Missing/wrong `x-billing-sync-secret` (or the secret is not configured).

  /api/tenant/config:
    get:
      tags: [secret-guarded]
      summary: Read a tenant's FULL config (bot token included)
      operationId: getTenantConfig
      description: >
        Returns the exact shape `getTenant()` consumes, including the bot token — so it is
        secret-guarded and never leaked without the header. 404 when the tenant has no config.
      security:
        - tenantSyncSecret: []
      parameters:
        - name: t
          in: query
          required: true
          schema: { type: string }
          description: Tenant id (self-host = `self`).
      responses:
        "200":
          description: The full tenant config.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantConfig" }
        "400":
          description: Missing `t`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/wrong `x-tenant-sync-secret` (or the secret is not configured).
        "404":
          description: No config saved for this tenant.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      tags: [secret-guarded]
      summary: Merge a partial config into the tenant's KV (the CLI writes here)
      operationId: setTenantConfig
      description: >
        MERGEs the provided `config` fields into KV `tenant:<tenantId>` — unset fields are
        preserved, so send only what changed. The `krispy` CLI's `set-kbase` posts here.
      security:
        - tenantSyncSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantConfigSetRequest" }
      responses:
        "200":
          description: Merged.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Ok" }
        "400":
          description: >
            Missing `tenantId` or `config`, or a malformed value — `avatar_scheme_invalid`
            (`theme.avatar` must be `buttr`, `https://…`, or
            `data:image/(png|webp|jpeg);base64,…`) or `cta_url_not_https` (connector
            `profileUrl`/`url` must be https).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Missing/wrong `x-tenant-sync-secret` (or the secret is not configured).
        "413":
          description: >
            Config over a hard size cap — `avatar_too_large` (`theme.avatar` over 48KB) or
            `kb_sources_too_large` (`kbSources` total text over 100K chars). Nothing is written.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  parameters:
    Tenant:
      name: t
      in: query
      required: false
      schema: { type: string, default: self }
      description: Tenant id (self-host default = `self`).

  securitySchemes:
    operatorBearer:
      type: http
      scheme: bearer
      description: >
        The operator app's session token (krispyai-cloud Better Auth bearer). The Worker
        verifies it against the cloud API's `GET /me` (`API_ORIGIN`) and requires the
        resolved `user.id` to equal the request's `tenantId` — a valid token for a
        DIFFERENT tenant is 403. Verified tokens are cached in-isolate for 60s.
        On the WebSocket upgrade the same token is passed as the `auth` query parameter
        (RN/browsers cannot set headers on a WS upgrade).
    tenantSyncSecret:
      type: apiKey
      in: header
      name: x-tenant-sync-secret
      description: Must equal the Worker's `TENANT_SYNC_SECRET`.
    adminUsageSecret:
      type: apiKey
      in: header
      name: x-admin-usage-secret
      description: >
        Must equal the Worker's `ADMIN_USAGE_SECRET`. Fail-closed: if the secret is unset the
        endpoint 403s (never serves counters unauthenticated).
    billingSyncSecret:
      type: apiKey
      in: header
      name: x-billing-sync-secret
      description: Must equal the Worker's `BILLING_SYNC_SECRET`.
    telegramWebhookSecret:
      type: apiKey
      in: header
      name: x-telegram-bot-api-secret-token
      description: Must equal the Worker's `TELEGRAM_WEBHOOK_SECRET` (Telegram echoes it back).

  schemas:
    Ok:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, const: true }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    UsageDetail:
      type: object
      description: One tenant's month-to-date counters (missing keys read as 0).
      required: [ai, handoff, tokens, tokensIn, tokensOut]
      properties:
        ai: { type: integer, description: AI conversations this month. }
        handoff: { type: integer, description: Handoffs to a human this month. }
        tokens: { type: integer, description: Total LLM tokens (in + out). }
        tokensIn: { type: integer, description: Prompt (input) tokens. }
        tokensOut: { type: integer, description: Completion (output) tokens. }

    EntitlementError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [subscription_required, usage_limit_reached]
        plan: { type: string }
        status: { type: string }

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }

    RingMessage:
      type: object
      required: [role, text, ts]
      description: One entry of the SessionDO's 20-message ring buffer.
      properties:
        role: { type: string, enum: [visitor, ai, operator] }
        text: { type: string }
        ts:
          type: integer
          description: Unix epoch millis, stamped at append time.

    OperatorReplyRequest:
      type: object
      required: [tenantId, sessionId, text]
      properties:
        tenantId: { type: string }
        sessionId: { type: string }
        text: { type: string, minLength: 1 }
        operatorName:
          type: string
          description: Display name learned onto the tenant's operator list (channel 'app').

    OperatorHandoffsResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          description: Newest activity first.
          items:
            type: object
            required: [sessionId, lastMessage, handedOff, ts, resolved]
            properties:
              sessionId: { type: string }
              lastMessage:
                type: [string, "null"]
                description: The ring-buffer tail (null when the ring is empty).
              handedOff:
                type: boolean
                description: >
                  True on default-inbox rows. Resolved rows (via `includeResolved: true`)
                  carry false — resolving hands the session back to the AI.
              ts:
                type: [integer, "null"]
                description: Epoch millis of the last message (null when the ring is empty).
              resolved:
                type: boolean
                description: >
                  Always false in the default response (resolved sessions are excluded);
                  true only for rows returned via `includeResolved: true`.

    OperatorThreadResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/RingMessage" }

    ChatRequest:
      type: object
      required: [sessionId, message]
      properties:
        sessionId: { type: string }
        message:
          type: string
          minLength: 1
          maxLength: 32768
          description: >
            Visitor text. Over ~32KB (32768) → 413 (cost-DoS guard). A message under the
            cap but over 4000 chars is accepted and silently truncated to 4000 before the
            model. Client history items are truncated the same way.
        tenantId: { type: string, default: self }
        history:
          type: array
          items: { $ref: "#/components/schemas/ChatMessage" }
          description: >
            SEED/FALLBACK ONLY. The bot's authoritative context is the server-side
            SessionDO ring; client history is used only when the ring is empty (first
            message of a legacy session) or when the ring read fails/times out
            (~1.5s guard). A non-empty ring always wins — spoofed history is ignored.

    ChatResult:
      type: object
      required: [reply, handoff, handedOff]
      properties:
        reply:
          type: [string, "null"]
          description: Visitor-facing reply, or null when a human operator is driving.
        handoff:
          type: boolean
          description: The AI asked to escalate → the widget should offer contact/lead capture.
        handedOff:
          type: boolean
          description: An operator already owns this session (bot is silent).
        degraded:
          type: boolean
          description: The AI was unavailable and the Worker fell back to a human.
        formId:
          type: [string, "null"]
          description: When the AI emitted `[!FORM:<id>]`, the id of the form to render.
        form:
          oneOf:
            - $ref: "#/components/schemas/FormSpec"
            - type: "null"
          description: The resolved FormSpec for `formId` (public projection), when present.

    ContactRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId: { type: string }
        tenantId: { type: string, default: self }
        name: { type: string }
        contact: { type: string }
        message: { type: string }

    LeadRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId: { type: string }
        tenantId: { type: string, default: self }
        formId:
          type: [string, "null"]
          description: The FormSpec id this lead answers; null for the default form.
        values:
          type: object
          additionalProperties: { type: string }
          description: The form's captured field values (machine key → value).
        history:
          type: array
          items: { $ref: "#/components/schemas/ChatMessage" }

    EntitlementSyncRequest:
      type: object
      required: [tenantId, snapshot]
      properties:
        tenantId: { type: string }
        snapshot:
          type: object
          description: EntitlementSnapshot (plan/status/limits) — opaque to the widget.
          additionalProperties: true

    TenantConfigSetRequest:
      type: object
      required: [tenantId, config]
      properties:
        tenantId: { type: string }
        config:
          allOf:
            - $ref: "#/components/schemas/TenantConfig"
          description: A partial config — only the provided fields are merged.

    UsageResponse:
      type: object
      required: [tenantId, usage, plan, entitled, status, limits, withinLimits]
      properties:
        tenantId: { type: string }
        usage:
          type: object
          properties:
            ai: { type: integer }
            handoff: { type: integer }
            tokens: { type: integer }
        plan: { type: string }
        entitled: { type: boolean }
        status: { type: string }
        limits:
          type: object
          additionalProperties: true
        withinLimits: { type: boolean }

    WidgetTheme:
      type: object
      description: Public widget appearance projection (all fields optional).
      properties:
        primaryColor:
          {
            type: string,
            description: "Header + visitor bubble + send button. Default gold #e39a2b.",
          }
        launcherColor: { type: string, description: "FAB only; defaults to primaryColor." }
        position:
          { type: string, enum: [br, bl], description: "bottom-right | bottom-left. Default br." }
        glowColor:
          {
            type: string,
            description: "Hex; launcher glow/sparkle/pulse tint. Unset = no glow layer (default).",
          }
        avatar:
          {
            type: string,
            description: '"buttr" (default), an https URL, or a data:image/… URI (≤48KB).',
          }
        greeting: { type: string, description: "First bot bubble on open." }
        headerTitle: { type: string }
        tagline: { type: string, description: "Header sub-line (e.g. usually replies in minutes)." }
        radius:
          { type: integer, minimum: 0, maximum: 20, description: "Corner radius px. Default 14." }
        font: { type: string, description: "CSS font-family stack." }
        sound: { type: boolean, description: "Notification ding while panel closed. Default true." }
        sparkle: { type: boolean, description: "Idle sparkle loop on the launcher. Default false." }
        direction:
          { type: string, enum: [ltr, rtl], description: "Panel text direction. Default ltr." }
        popupText: { type: string, description: "Proactive teaser-popup copy. Unset = popup off." }
        timing: { $ref: "#/components/schemas/WidgetTiming" }

    WidgetTiming:
      type: object
      description: >
        All ms; the widget clamps 0–300000. Each knob takes effect only when its feature
        is enabled — none changes the default widget on its own.
      properties:
        launcherDelayMs: { type: integer, description: "Default 0 = no entrance delay." }
        sparkleAfterMs: { type: integer, description: "Default 10000; inert unless sparkle." }
        popupDelayMs: { type: integer, description: "Default 8000; inert unless popupText." }
        popupCooldownHrs: { type: integer, description: "Default 24; inert unless popupText." }
        autoOpenMs:
          {
            type: integer,
            description: "Default 0 = never — auto-open after inbound msg while closed.",
          }

    FieldType:
      type: string
      enum: [text, email, tel, textarea, select]

    FormField:
      type: object
      required: [name, label, type]
      properties:
        name: { type: string, description: "Machine key, e.g. budget." }
        label: { type: string, description: "Visitor-facing." }
        type: { $ref: "#/components/schemas/FieldType" }
        required: { type: boolean }
        options:
          type: array
          items: { type: string }
          description: "select only."

    FormSpec:
      type: object
      required: [id, title, fields]
      properties:
        id: { type: string, description: "Referenced by [!FORM:<id>]." }
        title: { type: string }
        fields:
          type: array
          items: { $ref: "#/components/schemas/FormField" }
        connectorIds:
          type: array
          items: { type: string }
          description: "Which connectors receive this lead; default = ALL configured."

    ConnectorType:
      type: string
      enum: [email, telegram, whatsapp, instagram]

    Connector:
      type: object
      required: [id, type]
      properties:
        id: { type: string }
        type: { $ref: "#/components/schemas/ConnectorType" }
        toAddress: { type: string, description: "email." }
        phone: { type: string, description: "whatsapp (E.164 digits, no +)." }
        profileUrl: { type: string, description: "instagram." }

    Operator:
      type: object
      required: [id]
      description: >
        A human the bot @mentions on handoff (quiet-ops). Auto-learned from topic replies;
        secret-adjacent (Telegram user ids) — never returned by GET /api/widget/config.
      properties:
        id:
          {
            type: integer,
            format: int64,
            description: "Telegram user id (enough for a text_mention).",
          }
        name: { type: string, description: "display name; mention label when no username." }
        username: { type: string, description: "public @username (preferred — plain @mention)." }

    TenantConfig:
      type: object
      required: [botToken, chatId]
      description: >
        The full tenant record `getTenant()` consumes. Returned in full only by the
        secret-guarded GET /api/tenant/config.
      properties:
        botToken: { type: string, description: "Telegram bot token (BotFather)." }
        chatId:
          { type: string, description: "Supergroup id with Topics enabled, e.g. -1001234567890." }
        systemPrompt: { type: string }
        model: { type: string }
        onboardingStep: { type: integer }
        onboardingComplete: { type: boolean }
        forms:
          type: array
          items: { $ref: "#/components/schemas/FormSpec" }
        connectors:
          type: array
          items: { $ref: "#/components/schemas/Connector" }
        theme: { $ref: "#/components/schemas/WidgetTheme" }
        operators:
          type: array
          description: "Handoff-mention operators (auto-learned, capped at 10). NEVER exposed to the public widget config."
          items: { $ref: "#/components/schemas/Operator" }
