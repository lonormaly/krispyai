# Git hooks — so an agent (or human) literally can't COMMIT unformatted / unlinted
# code. Fast by construction: staged files only on commit. No pre-push gate (see below).
#
# Enable once after `bun install`:  bunx lefthook install
# Skip in a pinch:                  LEFTHOOK=0 git commit …   (or `git commit --no-verify`)

pre-commit:
  parallel: true
  commands:
    # Oxfmt (Rust) formats just the staged files and re-stages what it fixed.
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    # Oxlint (Rust, type-aware) over the staged files only — sub-second.
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

# NO pre-push hook — deliberately. There WAS a `bun run typecheck` here (full-workspace
# `bun --filter '@krispy*/*' typecheck` — every package, no affected/cache), removed
# 2026-07-12. A whole-workspace tsc on every push is a minutes-long gate that trains
# people to `--no-verify`, which is worse than no gate. Typecheck coverage lives in CI
# (ci.yml runs `bun run typecheck` on every push/PR) and in editors. Don't re-add a
# pre-push typecheck unless it's provably sub-30s cold from a fresh worktree.
