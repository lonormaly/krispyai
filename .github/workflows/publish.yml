# Publish @krispyai/cli to npm via TRUSTED PUBLISHING (OIDC) — no npm token.
#
# npm mints a short-lived, package-scoped credential from this workflow's OIDC identity;
# `--provenance` attaches a signed build-provenance attestation. There is NO npm token
# in this workflow or in GitHub Secrets after the one-time bootstrap.
#
# ── First-publish bootstrap (one time only) ─────────────────────────────────────
# Trusted Publishing can't be configured on npm until the package EXISTS. So:
#   1. Create a Classic *Automation* npm token, store it as the repo secret NPM_TOKEN.
#   2. Temporarily set NODE_AUTH_TOKEN in the publish step to ${{ secrets.NPM_TOKEN }}
#      (drop --provenance for this first run), tag v0.1.0, let it publish once.
#   3. On npmjs.com → the @krispyai/cli package → Settings → Trusted Publisher:
#      add THIS repo (lonormaly/krispyai) + workflow file `.github/workflows/publish.yml`.
#   4. DELETE the NPM_TOKEN secret and revert step 2. Tokenless forever after.
# Full checklist: AGENTS.md → "Release + publishing".
name: Publish CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — Trusted Publishing mints the credential from this
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      # npm CLI (Node) does the upload; the PACKAGE runtime is Bun. Node ≥20.17 / 22.9 is
      # required for `npm publish` Trusted Publishing (OIDC) support.
      - name: Setup Node (for npm publish + OIDC)
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the release on the same checks as CI — never publish a red build.
      - name: Typecheck (cli)
        run: bun --filter @krispyai/cli typecheck

      - name: Test (cli)
        run: bun --filter @krispyai/cli test

      # Trusted Publishing: no NODE_AUTH_TOKEN. npm@latest is required (the pinned npm in
      # older Node ships without OIDC publish). --provenance signs the build.
      - name: Publish @krispyai/cli (Trusted Publishing)
        working-directory: packages/cli
        run: npx npm@latest publish --provenance --access public
