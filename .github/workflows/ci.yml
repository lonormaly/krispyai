name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # COMPLIANCE — secret scanning. Fails the build if a real secret is committed.
      # Config + allowlist: .gitleaks.toml.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Oxlint + Oxfmt run over the whole repo (Rust-fast) — see docs/linting.md.
      - name: Lint (oxlint)
        run: bunx oxlint

      - name: Format check (oxfmt)
        run: bunx oxfmt --check .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  # COMPLIANCE — dependency vulnerability scan (Google's OSV database). Runs as its own
  # job so a vuln finding is a distinct, visible gate.
  vuln-scan:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.2.4"
    permissions:
      contents: read
      security-events: write
      actions: read
